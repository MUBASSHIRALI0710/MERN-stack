<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <table border="1">
    <caption>My Multi Level Table</caption>
    <thead>
      <tr>
        <th colspan="2" rowspan="2">Column 0</th>
        <th rowspan="2">Column 1</th>
        <th colspan="2">Column 2</th>
      </tr>

      <tr>
        <th>Column 2a</th>
        <th>Column 2b</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <th rowspan="2">row</th>
        <th>row 1a</th>
        <td>123</td>
        <td>456</td>
        <td>789</td>
      </tr>
      <tr>
        <th>row 1b</th>
        <td>123</td>
        <td>456</td>
        <td>987</td>
      </tr>
      <tr>
        <th colspan="2">row 2</th>
        <td>123</td>
        <td>456</td>
        <td>987</td>
      </tr>
    </tbody>
  </table>
  </th>
  </tr>
  </thead>

  </table>
</body>

</html>
