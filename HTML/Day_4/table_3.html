<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <table border="2" style="background-color: rgb(24, 25, 26);">
    <thead>
      <tr style="background-color: rgb(222, 188, 144);">
        <th>Column 1</th>
        <th>Column 2</th>
        <th>Column 3</th>
        <th>Column 4</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td colspan="2" style="background-color: cadetblue;">Row 1 Column 1-2</td>
        <td style="background-color: rgb(179, 139, 196);">Row 1 Column 3</td>
        <td rowspan="2" style="background-color: rgb(193, 192, 117);">Row 1-2 Column 4</td>
      </tr>

      <tr>
        <td colspan="3" style="background-color: rgb(197, 155, 91);">Row 2 Column 1-2-3</td>
      </tr>
    </tbody>

  </table>
</body>

</html>
