<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
</head>

<body>
  <h1>Feedback Form</h1>
  <form>
    <lable for="first">Your Name:</lable>
    <input type="text" id="first">
    <br><br>
    <lable for="second">Your Email:</lable>
    <input type="email" id="second">
    <br><br>
    <label for=""> Rate Us:</label>
    <input type="radio" id="one_stars" Name="rating" value="1 Stars" required>
    <label for="one_stars">1 Stars</label>
    <input type="radio" id="one_stars" Name="rating" value="2 Stars" required>
    <label for="one_stars">2 Stars</label>
    <input type="radio" id="two_stars" Name="rating" value="3 Stars" required>
    <label for="two_stars">3 Stars</label>
    <input type="radio" id="four_stars" Name="rating" value="4 Stars" required>
    <label for="four_stars">4 Stars</label>
    <input type="radio" id="five_stars" Name="rating" value="5 Stars" required>
    <label for="five_stars">5 Stars</label>

    <br><br>
    <label for="message">Comments</label>
    <textarea name="User Feedback" id="message" rows="4" cols="25"></textarea>
    <button>Submit Feedback</button>
  </form>
</body>

</html>
