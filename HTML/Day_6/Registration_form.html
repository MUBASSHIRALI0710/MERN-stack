<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
</head>

<body>
  <form>
    <h2>User Registration</h2>
    <label for="uname">User Name:</label>
    <input type="text" id="uname" placeholder="Enter Username">
    <br><br>
    <label for="email">E-mail:</label>
    <input type="email" id="email" placeholder="Enter E-mail">
    <br><br>
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter Password">
    <br><br>

    <label>Gender:</label>
    <input type="radio" id="male" name="Gender" value="Male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="Gender" value="Female">
    <label for="female">Female</label>
    <input type="radio" id="other" name="Gender" value="Other">
    <label for="other">Other</label>
    <br><br>

    <input type="checkbox" id="check" name="conditions" value="Yes">
    <label for="check">I agree to the terms and conditions</label>
    <br><br>
    <button>Register</button>
  </form>

</body>

</html>
