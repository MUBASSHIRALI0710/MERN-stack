<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>

<body>
  <form>
    <h1>Contact Us</h1>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter Your Name" name="Username">
    <br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter Your Email" name="User Email Id">
    <br><br>
    <label for="p_no">Phone Number:</label>
    <input type="tel" id="p_no" placeholder="Enter Your Phone Number" name="User Phone No.">
    <br><br>
    <label for="message">Message:</label>
    <textarea rows="6" cols="30" name="type=" text" id="message" placeholder="Message...." name="User Request Message"
      id=""></textarea>
    <br><br>
    <button>Send</button>

  </form>
</body>

</html>
