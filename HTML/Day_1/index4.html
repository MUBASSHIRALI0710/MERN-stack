<h1>How To Make Tea</h1>

<ul style="list-style-type: square;">
  <li>Take water</li>
  <li>Add sugar</li>
  <li>Add chaipatti</li>
  <li>Add milk</li>
  <li>Boil it for 5 min</li>
  <li>Tea is ready</li> 
</ul>

<h1>How To Make Maggi</h1>

<ol type="i">

  <li>Boil it for 5 min</li>
  <li>Maggi is ready</li> 
</ol>
