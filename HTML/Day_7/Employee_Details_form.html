<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Details Form</title>
</head>

<body>
  <h1>Employee Details Form</h1>
  <form>
    <!-- name -->
    <label for="name">Full Name:</label>
    <input type="text" name="fname" id="name" placeholder="Enter your full name">
    <br><br>
    <!-- email -->
    <label for="email">Email:</label>
    <input type="email" name="email" id="email" placeholder="Enter your email Id">
    <br><br>
    <!-- Phone no. -->
    <label for="pno">Phone Number:</label>
    <input type="number" name="Phone number" id="pno" placeholder="Enter your phone number">
    <br><br>
    <!-- GENDER -->
    <!-- MALE -->
    <label>Gender:</label>
    <input type="radio" id="male" value="Male" name="Gender">
    <label for="male">Male</label>
    <!-- Female -->
    <input type="radio" id="female" value="Female" name="Gender">
    <label for="female">Female</label>
    <!-- other -->
    <input type="radio" id="other" value="other" name="Gender">
    <label for="other">Other</label>
    <br><br>
    <!-- Job Title -->
    <label for="jobt">Job Title:</label>
    <input type="text" name="Job Title" id="jobt" placeholder="Enter your job title">
    <br><br>
    <!-- Department -->
    <label for="dep">Department:</label>
    <select name="Department" id="dep">
      <option disabled selected>Select your department</option>
      <option value="Engineer">Engineer</option>
      <option value="Finance">Finance</option>
      <option value="IT">IT</option>
      <option value="Developer">Electical</option>
      <option value="Rest">Rest</option>
    </select>
    <br><br>
    <button>Submit</button>
  </form>
</body>

</html>
