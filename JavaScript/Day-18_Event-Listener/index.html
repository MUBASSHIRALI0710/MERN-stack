<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event listener</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .grandparent {
      border-radius: 20%;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 400px;
      width: 400px;
      border: 2px solid black;
      background-color: royalblue;
    }

    .parent {
      border-radius: 20%;
      height: 200px;
      width: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid black;
      background-color: palegoldenrod;
    }

    .child {
      border-radius: 20%;
      height: 100px;
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid black;
      background-color: chocolate;
    }

    div:hover {
      border-radius: 0%;
    }
  </style>
</head>

<body>
  <div class="grandparent">
    <div class="parent">
      <div class="child"></div>
    </div>
  </div>

  <script>
    const grandparent = document.querySelector(".grandparent")
    const parent = document.querySelector(".parent")
    const child = document.querySelector(".child")

    child.addEventListener("click" ,(e) => {
      alert ("i am child")
      e.stopPropagation()
    })
    
  </script>
</body>

</html>
