<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>



<body>

  <header>
    <div class="nav">
      <div class="navbar">
        <div class="logo">
          <p>BookMyShow</p>
        </div>
        <div class="navMenu">
          <ul>
            <li><a class="navlink" href="#Events">Events</a></li>
            <li><a class="navlink" href="#Movies">Movies</a></li>
            <li><a class="navlink" href="#Sports">Sports</a></li>
            <li><a class="navlink" href="#More">More</a></li>
          </ul>
        </div>
      </div>

    </div>
    <div class="search">
      <input type="text" class="searchBar" placeholder="Search for Movies, Events And Sports.....">
      <button class="searchBtn">🔍 Search</button>
    </div>
  </header>

  <!-- main -->
  <main>
    <div class="hero">
      <h2 class="heroHeading">Experience the Best Movies and Event</h2>
      <button class="heroBtn">Book Now</button>
    </div>

    <div class="mover">
      <h2>Popular Movies</h2>
    </div>
    <div class="movie">
      <div class="card">

      </div>
    </div>
  </main>
</body>

</html>
