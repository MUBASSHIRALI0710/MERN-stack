<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summer Olympics 2028</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="top" class="heading">
    <h3 id="topline">How many days until</h3>
    <h1 id="tophead">Summer Olympics 2028</h1>
    <h4 id="olyDate" class="date_location">&#128197 Friday, 21 July 2028 00:000</h4>
    <h4 id="location" class="date_location">&#x1F6A9 Los Angeles, USA</h4>
  </div>

  <div id="count">
    <div id="day">
      <h1 id="dayleft">1311</h1>
      <p style="font-size: 25px; margin-left: 1.2em; margin-top: 0;">Days</p>
    </div>
    <div id="Olytime" style="display: inline-flex; gap: 25px;">
      <!-- hours -->
      <div id="Olyhour" class="timeBox">
        <h1 id="hourleft" >15</h1>
        <p>Hours</p>
      </div>
      <!-- Minutes -->
      <div id="Olyminutes"class="timeBox">
        <h1 id="minutesleft">26</h1>
        <p>Minuts to go</p>
      </div>
      <!-- seconds -->
      <div id="Olyseconds"class="timeBox">
        <h1 id="secondsleft">58</h1>
        <p>Seconds</p>
      </div>
    </div>
  </div>

</body>
<script src="./script.js"></script>

</html>
